name: bayt_alhikma
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  webview_flutter: ^4.13.0
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dio: ^5.4.0
  path_provider: ^2.1.2
  just_audio: ^0.10.5
  modal_progress_hud_nsn: ^0.5.1
  provider: ^6.1.5+1
  syncfusion_flutter_pdfviewer: ^31.1.19
  shared_preferences: ^2.2.0
  share_plus: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  html: ^0.15.4
  permission_handler: ^11.0.1
  flutter_secure_storage: ^9.0.0 # For secure key storage
  pointycastle: ^3.9.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - images/
    - images/avatars/1.png
    - images/avatars/2.png
    - images/avatars/3.png
    - images/avatars/4.png
    - images/avatars/5.png
    - images/avatars/6.png
    - images/avatars/7.png
    - images/avatars/8.png
    - images/avatars/9.png
    - images/logo_placeholder.png
    - images/chat_background.png
    - images/screenAssets/door_1.png
    - images/screenAssets/door_2.png
    - images/Baghdad.png
    - images/astrolab.png
  fonts:
    - family: Dubai
      fonts:
        - asset: assets/fonts/DUBAI-LIGHT.TTF
          weight: 400
        - asset: assets/fonts/DUBAI-REGULAR.TTF
          weight: 400
        - asset: assets/fonts/DUBAI-MEDIUM.TTF
          weight: 500
        - asset: assets/fonts/DUBAI-BOLD.TTF
          weight: 700
    - family: Al-Tarhouny
      fonts:
        - asset: assets/fonts/TARO.TTF
          weight: 700

    - family: Andalus
      fonts:
        - asset: assets/fonts/ANDLUS.TTF
          weight: 700

    - family: Arabic Typesetting
      fonts:
        - asset: assets/fonts/ARABTYPE.TTF
          weight: 700
